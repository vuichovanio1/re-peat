# Nginx server config for re-peat.store
# Place inside your nginx site config and adjust cert/key paths.

server {
    listen 80;
    listen [::]:80;
    server_name re-peat.store www.re-peat.store;
    return 301 https://re-peat.store$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.re-peat.store;

    ssl_certificate /etc/letsencrypt/live/re-peat.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/re-peat.store/privkey.pem;

    return 301 https://re-peat.store$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name re-peat.store;

    root /var/www/re-peat;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/re-peat.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/re-peat.store/privkey.pem;

    # Compression for CWV and transfer size reduction.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # Enable Brotli if ngx_brotli module is available.
    brotli on;
    brotli_comp_level 5;
    brotli_static on;
    brotli_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # HTML should revalidate quickly to keep content fresh.
    location ~* \.(html)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # Fingerprint-less static assets still get long cache.
    location ~* \.(?:css|js|webp|svg|png|jpe?g|gif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /site.webmanifest {
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
        try_files $uri =404;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
        try_files $uri =404;
    }

    location = /index.html {
        return 301 /;
    }

    location = /blog/index.html {
        return 301 /blog/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
